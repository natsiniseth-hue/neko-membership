    }},'✓ นับเป็นมาใช้บริการจริง'));

    box.appendChild(el('div',{style:'height:12px;'}));
    box.appendChild(el('div',{style:'font-size:12px;font-weight:600;margin-bottom:6px;'},'🛡 รักษาสิทธิ (เหตุสุดวิสัย)'));
    const reasonInp = el('input',{type:'text', placeholder:'ระบุเหตุผล เช่น ลูกค้าป่วย/ไปต่างประเทศ'});
    reasonInp.value = graceReasonInput;
    reasonInp.addEventListener('input', e=>{ graceReasonInput = e.target.value; });
    box.appendChild(reasonInp);
    box.appendChild(el('button',{class:'btn secondary block', style:'margin-top:8px;', onclick:()=>{
      if(!graceReasonInput.trim()){ showToast('กรุณาระบุเหตุผลก่อนรักษาสิทธิ'); return; }
      mem.graceMonths = mem.graceMonths || [];
      mem.graceMonths.push({ month:key, reason:graceReasonInput.trim(), addedAt:new Date().toISOString(), addedBy: currentUsername||'' });
      saveMembers();
      monthActionTarget = null;
      graceReasonInput = '';
      render();
    }},'รักษาสิทธิเดือนนี้'));

    box.appendChild(el('div',{class:'modal-actions'},[
      el('button',{class:'btn ghost', style:'flex:1;', onclick:()=>{ monthActionTarget=null; render(); }},'ยกเลิก')
    ]));
    overlay.appendChild(box);
    app.appendChild(overlay);
  }

  function renderTxEditModal(){
    const found = findTx(editingTx.scope, editingTx.phone, editingTx.txId);
    if(!found){ closeTxEditor(); return; }
    const overlay = el('div',{class:'overlay', onclick:(e)=>{ if(e.target===overlay){closeTxEditor();} }});
    const box = el('div',{class:'modal'});
    box.appendChild(el('div',{class:'modal-head'},[
      el('div',{class:'modal-title'},'แก้ไขรายการขาย'),
      el('button',{class:'close-x', onclick:closeTxEditor},'✕')
    ]));

    const dateInp = el('input',{type:'datetime-local'}); dateInp.value = txEditTimestamp;
    dateInp.addEventListener('change', e=>{ txEditTimestamp = e.target.value; });
    box.appendChild(el('div',{class:'field', style:'margin-bottom:14px;'},[el('label',{},'วันเวลา'), dateInp]));

    const cartList = el('div',{style:'margin-bottom:10px;'});
    function redrawCart(){
      cartList.innerHTML = '';
      txEditCart.forEach((it, idx)=>{
        const nameInp = el('input',{type:'text', style:'font-size:12.5px;padding:6px 8px;'}); nameInp.value = it.serviceName;
        nameInp.addEventListener('input', e=>{ it.serviceName = e.target.value; });
        const priceInp = el('input',{type:'number', style:'font-size:12.5px;padding:6px 8px;width:90px;'}); priceInp.value = it.price;
        priceInp.addEventListener('input', e=>{ it.price = parseFloat(e.target.value)||0; });
        const eligChk = el('input',{type:'checkbox', style:'width:auto;'}); eligChk.checked = it.discountEligible;
        eligChk.addEventListener('change', e=>{ it.discountEligible = e.target.checked; });
        cartList.appendChild(el('div',{class:'cart-item-row'},[
          nameInp, priceInp,
          el('label',{style:'display:flex;align-items:center;gap:4px;font-size:10.5px;color:var(--muted);white-space:nowrap;'},[eligChk, document.createTextNode('ร่วมส่วนลด')]),
          el('button',{class:'close-x', onclick:()=>{ txEditCart.splice(idx,1); redrawCart(); }},'✕')
        ]));
      });
    }
    redrawCart();
    box.appendChild(cartList);

    box.appendChild(el('button',{class:'btn ghost', onclick:()=>{
      txEditCart.push({ serviceName:'บริการใหม่', price:0, discountEligible:true });
      redrawCart();
    }},'+ เพิ่มรายการ'));

    const discSelect = el('select',{style:'margin-top:14px;'});
    if(editingTx.scope==='member'){
      const tier = tierForStreak(computeStreak(found.mem));
      discSelect.appendChild(el('option',{value:'tier'}, `ส่วนลดตามระดับสมาชิก (${tier.discount}%)`));
    }
    discSelect.appendChild(el('option',{value:'none'},'ไม่มีส่วนลด'));
    promotions.forEach(p=>{
      discSelect.appendChild(el('option',{value:p.id}, `โปรโมชั่น: ${p.name} (${p.percent}%)`));
    });
    discSelect.value = txEditDiscountChoice;
    discSelect.addEventListener('change', e=>{ txEditDiscountChoice = e.target.value; });
    box.appendChild(discSelect);

    box.appendChild(el('div',{class:'admin-note'},'แก้ไขแล้วระบบจะคำนวณส่วนลดและยอดรวมใหม่ทั้งหมดตามค่าปัจจุบัน'));

    box.appendChild(el('div',{class:'modal-actions'},[
      el('button',{class:'btn secondary', style:'flex:1;', onclick:closeTxEditor},'ยกเลิก'),
      el('button',{class:'btn', style:'flex:1;', onclick:saveTxEdit},'บันทึกการแก้ไข')
    ]));

    overlay.appendChild(box);
    app.appendChild(overlay);
  }

  function renderStaffModal(){
    const overlay = el('div',{class:'overlay', onclick:(e)=>{ if(e.target===overlay){modal=null; render();} }});
    const box = el('div',{class:'modal'});
    box.appendChild(el('div',{class:'modal-head'},[
      el('div',{class:'modal-title'},'จัดการบัญชีพนักงาน'),
      el('button',{class:'close-x', onclick:()=>{modal=null; render();}},'✕')
    ]));
    box.appendChild(el('div',{style:'font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6;'},
      'พนักงานล็อกอินด้วยบัญชีตัวเอง ทำงานหน้าร้านได้ (เพิ่มสมาชิก เช็คอิน บันทึกบริการ+ราคา) แต่จะไม่เห็นเมนูตั้งค่าระดับส่วนลด โปรโมชั่น การลบสมาชิก และการแก้ไขประวัติย้อนหลัง'));

    const list = el('div',{});
    function redrawList(){
      list.innerHTML = '';
      if(adminAuth.staff.length===0){
        list.appendChild(el('div',{class:'empty'},'ยังไม่มีบัญชีพนักงาน'));
      }
      adminAuth.staff.forEach(s=>{
        list.appendChild(el('div',{class:'promo-row'},[
          el('div',{class:'promo-name'}, s.username),
          el('button',{class:'link-btn', onclick: async ()=>{
            const np = prompt(`ตั้งรหัสผ่านใหม่ให้ "${s.username}" (อย่างน้อย 6 ตัว):`);
            if(np===null) return;
            if(np.length<6){ showToast('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร'); return; }
            s.salt = genSalt();
            s.hash = await sha256Hex(s.salt+':'+np);
            await saveAuth();
            showToast(`ตั้งรหัสใหม่ให้ ${s.username} แล้ว`);
          }},'ตั้งรหัสใหม่'),
          el('button',{class:'close-x', onclick: async ()=>{
            if(!confirm(`ลบบัญชีพนักงาน "${s.username}" หรือไม่?`)) return;
            adminAuth.staff = adminAuth.staff.filter(x=>x.id!==s.id);
            await saveAuth();
            redrawList();
          }},'✕')
        ]));
      });
    }
    redrawList();
    box.appendChild(list);

    const uInp = el('input',{type:'text', placeholder:'ชื่อผู้ใช้พนักงาน'});
    const pInp = el('input',{type:'password', placeholder:'รหัสผ่าน (6 ตัวขึ้นไป)'});
    box.appendChild(el('div',{class:'add-row', style:'margin-top:10px;'},[uInp, pInp]));
    box.appendChild(el('button',{class:'btn ghost', style:'margin-top:8px;', onclick: async ()=>{
      const uname = uInp.value.trim();
      if(!uname){ showToast('กรอกชื่อผู้ใช้พนักงาน'); return; }
      if(uname === adminAuth.owner.username || adminAuth.staff.some(s=>s.username===uname)){
        showToast('ชื่อผู้ใช้นี้ถูกใช้แล้ว'); return;
      }
      if(pInp.value.length<6){ showToast('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร'); return; }
      const salt = genSalt();
      const hash = await sha256Hex(salt+':'+pInp.value);
      adminAuth.staff.push({ id:'st_'+Date.now(), username:uname, salt, hash });
      await saveAuth();
      uInp.value=''; pInp.value='';
      redrawList();
      showToast('เพิ่มบัญชีพนักงานแล้ว');
    }},'+ เพิ่มพนักงาน'));

    box.appendChild(el('div',{class:'modal-actions'},[
      el('button',{class:'btn secondary', style:'flex:1;', onclick:()=>{modal=null; render();}},'เสร็จสิ้น')
    ]));
    overlay.appendChild(box);
    app.appendChild(overlay);
  }

  initPetals();
  loadAll();
})();
</script>

</body>
</html>
