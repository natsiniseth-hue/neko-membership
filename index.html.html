<body>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Trirong:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap');

  :root{
    --bg:#FFF8FA;
    --surface:#FFFFFF;
    --surface2:#FFF1F6;
    --line:#F5D9E6;
    --sakura:#E8709F;
    --sakura-dark:#C24B7C;
    --sakura-pale:#FBDCE7;
    --gold:#B98A4E;
    --text:#3A2432;
    --muted:#93707F;
    --danger:#C0473F;
  }
  *{box-sizing:border-box;}
  .neko-root{
    position:relative;
    font-family:'Sarabun',sans-serif;
    background:
      radial-gradient(circle at 90% -5%, rgba(232,112,159,0.08), transparent 45%),
      radial-gradient(circle at 0% 100%, rgba(185,138,78,0.06), transparent 40%),
      var(--bg);
    color:var(--text);
    min-height:100%;
    overflow:hidden;
  }
  .wrap{max-width:920px;margin:0 auto;padding:28px 20px 60px;position:relative;z-index:2;}

  /* falling sakura petals */
  .sakura-petals{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:1;}
  .petal{
    position:absolute;top:-8%;
    border-radius:0 60% 0 60%;
    opacity:.75;
    animation-name:petal-fall, petal-sway;
    animation-timing-function:linear, ease-in-out;
    animation-iteration-count:infinite, infinite;
  }
  @keyframes petal-fall{
    from{ transform:translateY(-8vh) rotate(0deg); }
    to{ transform:translateY(112vh) rotate(360deg); }
  }
  @keyframes petal-sway{
    0%,100%{ margin-left:0px; }
    50%{ margin-left:40px; }
  }
  @media (prefers-reduced-motion: reduce){
    .petal{ animation:none; display:none; }
  }

  .top-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
  .back-link{
    background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit;
    display:flex;align-items:center;gap:6px;padding:6px 4px;
  }
  .back-link:hover{color:var(--sakura-dark);}
  .admin-entry-link{
    background:none;border:1px solid var(--line);color:var(--muted);font-size:11.5px;cursor:pointer;font-family:inherit;
    display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;transition:.15s;
  }
  .admin-entry-link:hover{color:var(--sakura-dark);border-color:var(--sakura);background:var(--sakura-pale);}
  .side-pill{
    font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--sakura-dark);
    background:var(--sakura-pale);padding:5px 12px;border-radius:20px;font-weight:600;
  }

  .header{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:26px;flex-direction:column;text-align:center;}
  .header-brand{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .brand-logo{
    width:76px;height:auto;flex-shrink:0;
    filter:drop-shadow(0 4px 14px rgba(232,112,159,.25));
  }
  .brand-eyebrow{font-size:11px;letter-spacing:.24em;color:var(--sakura-dark);text-transform:uppercase;margin-bottom:2px;display:flex;align-items:center;gap:8px;}
  .brand-eyebrow::before, .brand-eyebrow::after{content:'';width:16px;height:1px;background:var(--sakura);opacity:.5;}
  .brand-title{font-family:'Trirong',serif;font-size:26px;font-weight:700;letter-spacing:.02em;color:var(--text);}
  .brand-flourish{display:flex;align-items:center;gap:8px;color:var(--gold);font-size:13px;margin:2px 0;}
  .brand-flourish::before, .brand-flourish::after{content:'';width:22px;height:1px;background:linear-gradient(90deg, transparent, var(--gold));}
  .brand-flourish::after{background:linear-gradient(90deg, var(--gold), transparent);}
  .brand-sub{color:var(--muted);font-size:12.5px;margin-top:2px;}

  .landing-choices{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-top:8px;}
  .choice-card{
    background:var(--surface);border:1px solid var(--line);border-radius:18px;
    padding:28px 24px;width:220px;text-align:center;cursor:pointer;transition:.18s;
    box-shadow:0 4px 18px rgba(232,112,159,.08);
  }
  .choice-card:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(232,112,159,.16);border-color:var(--sakura);}
  .choice-emoji{font-size:34px;margin-bottom:10px;}
  .choice-title{font-family:'Trirong',serif;font-size:16px;font-weight:700;margin-bottom:6px;}
  .choice-desc{font-size:12px;color:var(--muted);line-height:1.6;}

  .panel{
    background:var(--surface);
    border:1px solid var(--line);
    border-top:3px solid var(--sakura);
    border-radius:16px;
    padding:20px;
    margin-bottom:16px;
    box-shadow:0 2px 14px rgba(232,112,159,.05);
    position:relative;
  }
  .risk-panel{border-top-color:var(--gold);}
  .panel-title{
    font-family:'Trirong',serif;font-size:17px;margin-bottom:16px;color:var(--sakura-dark);
    font-weight:600;letter-spacing:.01em;position:relative;padding-bottom:10px;
  }
  .panel-title::after{
    content:'';position:absolute;left:0;bottom:0;width:38px;height:3px;border-radius:3px;
    background:linear-gradient(90deg, var(--sakura), var(--gold));
  }
  .risk-panel .panel-title::after{background:linear-gradient(90deg, var(--gold), var(--sakura));}

  .add-row{display:flex;gap:10px;flex-wrap:wrap;}
  .field{flex:1;min-width:150px;display:flex;flex-direction:column;gap:6px;}
  .field label{font-size:11px;color:var(--muted);letter-spacing:.05em;}
  input[type=text],input[type=tel],input[type=date],input[type=number],input[type=password],select{
    background:var(--surface);border:1px solid var(--line);color:var(--text);
    padding:11px 13px;border-radius:10px;font-family:inherit;font-size:14px;outline:none;
    transition:.15s;
  }
  input:focus,select:focus{border-color:var(--sakura);box-shadow:0 0 0 3px rgba(232,112,159,.12);}
  .btn{
    background:var(--sakura);color:#fff;border:none;padding:11px 20px;border-radius:10px;
    font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;transition:.15s;white-space:nowrap;
  }
  .btn:hover{background:var(--sakura-dark);transform:translateY(-1px);}
  .btn:active{transform:translateY(0);}
  .btn.secondary{background:var(--surface2);color:var(--text);border:1px solid var(--line);}
  .btn.secondary:hover{border-color:var(--sakura);background:#fff;}
  .btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line);padding:7px 14px;font-size:12px;}
  .btn.danger{background:transparent;color:var(--danger);border:1px solid rgba(192,71,63,.35);padding:7px 14px;font-size:12px;}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
  .btn.block{width:100%;}

  .search-row{display:flex;gap:10px;margin-bottom:14px;}
  .search-row input{flex:1;}

  .member-list{display:flex;flex-direction:column;gap:10px;}
  .member-card{
    background:var(--surface2);border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;
    transition:.15s;
  }
  .member-card:hover{border-color:var(--sakura);background:#fff;}
  .tier-badge{
    width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:'Trirong',serif;font-size:13px;font-weight:700;flex-shrink:0;
    border:1px solid var(--line);background:#fff;
  }
  .m-info{flex:1;min-width:0;}
  .m-name{font-size:15px;font-weight:600;}
  .m-phone{font-size:12px;color:var(--muted);letter-spacing:.03em;}
  .m-tier-name{font-size:12px;color:var(--gold);margin-top:2px;}
  .m-discount{
    font-family:'Trirong',serif;font-size:20px;font-weight:700;color:var(--sakura-dark);
    text-align:right;min-width:60px;
  }
  .m-discount span{font-size:11px;color:var(--muted);display:block;font-family:'Sarabun',sans-serif;font-weight:400;}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:30px 10px;}

  .overlay{
    position:fixed;inset:0;background:rgba(58,36,50,.45);backdrop-filter:blur(3px);
    display:flex;align-items:center;justify-content:center;padding:20px;z-index:50;
  }
  .modal{
    background:var(--surface);border:1px solid var(--line);border-radius:20px;
    padding:24px;max-width:500px;width:100%;max-height:88vh;overflow-y:auto;
    box-shadow:0 20px 60px rgba(58,36,50,.25);
  }
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .modal-title{font-family:'Trirong',serif;font-size:18px;}
  .close-x{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;padding:2px 6px;}
  .close-x:hover{color:var(--text);}

  .detail-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px;gap:10px;}
  .detail-row:last-child{border-bottom:none;}
  .detail-row .k{color:var(--muted);flex-shrink:0;}

  // ---------- crypto helpers ----------
  async function sha256Hex(str){
    const enc = new TextEncoder().encode(str);
    const buf = await crypto.subtle.digest('SHA-256', enc);
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  function genSalt(){

  // ---------- device session (จดจำเครื่องนี้ — เก็บใน localStorage เฉพาะเครื่อง ไม่ sync ข้ามอุปกรณ์) ----------
  const SESSION_DAYS = 30;
  function saveSession(role, username){
    try{
      const expiresAt = Date.now() + SESSION_DAYS*24*60*60*1000;
      localStorage.setItem(SESSION_KEY, JSON.stringify({ role, username, expiresAt }));
    }catch(e){}
  }
  function clearSession(){
    try{ localStorage.removeItem(SESSION_KEY); }catch(e){}
  }
  function requestNotificationPermission(){
    if(typeof Notification === 'undefined') return;
    if(Notification.permission === 'default'){
      Notification.requestPermission().catch(()=>{});

  function checkImminentBookingsAndNotify(){
    if(!currentRole) return; // แจ้งเตือนเฉพาะตอนล็อกอินอยู่เท่านั้น
    if(!bookingConfig || !bookingConfig.reminderEnabled) return;
    if(typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
    const todayIso = new Date().toISOString().slice(0,10);
    // คิวดูรวมกันทั้งร้าน — แจ้งเตือนคิวใกล้ถึงให้ทุกคนเห็นเหมือนกัน
    const relevant = getBookingsForDate(todayIso);
    relevant.forEach(b=>{
      if(bookingNotifiedIds.has(b.id)) return;
      if(isImminentBooking(b)){
        try{
          new Notification('⏰ คิวใกล้ถึงแล้ว — NEKO', {
            body: `${b.time} น. — ${b.customerName}${b.serviceName?' • '+b.serviceName:''}`
          });
        }catch(e){}
        bookingNotifiedIds.add(b.id);
      }
    });
  }
  function startBookingReminderTimer(){
    if(bookingReminderTimer) return;
    requestNotificationPermission();
    checkImminentBookingsAndNotify();
    bookingReminderTimer = setInterval(checkImminentBookingsAndNotify, 30000);
  }

  function tryRestoreSession(){
    let raw;
    try{ raw = localStorage.getItem(SESSION_KEY); }catch(e){ return false; }
    if(!raw) return false;
    let sess;
    try{ sess = JSON.parse(raw); }catch(e){ clearSession(); return false; }
    if(!sess || !sess.expiresAt || Date.now() > sess.expiresAt){ clearSession(); return false; }
    if(!adminAuth) return false;
    if(sess.role === 'owner' && adminAuth.owner && adminAuth.owner.username === sess.username){
      currentRole = 'owner'; currentUsername = sess.username; startBookingReminderTimer(); return true;
    }
    if(sess.role === 'staff' && adminAuth.staff && adminAuth.staff.some(s=>s.username===sess.username)){
      currentRole = 'staff'; currentUsername = sess.username; startBookingReminderTimer(); return true;
    }
    clearSession();
    return false;
  }

  // ---------- date helpers ----------
  function pad(n){ return String(n).padStart(2,'0'); }
  function ymKey(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1); }
  function thaiMonth(ymStr){
    const [y,m] = ymStr.split('-').map(Number);
    const names=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    return names[m-1]+' '+(y+543).toString().slice(-2);
  }
  function formatDateTime(iso){
    const d = new Date(iso);
    const dd = pad(d.getDate()), mm = pad(d.getMonth()+1), yy = (d.getFullYear()+543).toString().slice(-2);
    const hh = pad(d.getHours()), mi = pad(d.getMinutes());
    return `${dd}/${mm}/${yy} ${hh}:${mi} น.`;
  }
  function money(n){
    return Number(n||0).toLocaleString('th-TH', {maximumFractionDigits:0});
  }

  // ---------- booking helpers ----------
  const WEEKDAY_TH = ['อา','จ','อ','พ','พฤ','ศ','ส'];
  function isoDate(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
  function parseIsoDate(s){ const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
  function addDays(dateStr, n){ const d = parseIsoDate(dateStr); d.setDate(d.getDate()+n); return isoDate(d); }
  function startOfWeek(dateStr){ const d = parseIsoDate(dateStr); const day = d.getDay(); d.setDate(d.getDate()-day); return isoDate(d); }
  function formatDateThaiShort(dateStr){
    const d = parseIsoDate(dateStr);
    return `${d.getDate()} ${thaiMonth(ymKey(d)).split(' ')[0]} ${(d.getFullYear()+543).toString().slice(-2)}`;
  }
  function formatDateThaiFull(dateStr){
    const d = parseIsoDate(dateStr);
    return `วัน${['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'][d.getDay()]}ที่ ${d.getDate()} ${thaiMonth(ymKey(d)).split(' ')[0]} ${d.getFullYear()+543}`;
  }
  function timeToMinutes(t){ const [h,m] = t.split(':').map(Number); return h*60+m; }
  function minutesToTime(m){ return pad(Math.floor(m/60))+':'+pad(m%60); }
  function generateSlots(){
    const slots = [];
    const start = timeToMinutes(bookingConfig.openTime);
    const end = timeToMinutes(bookingConfig.closeTime);
    for(let t=start; t<end; t+=bookingConfig.slotMinutes){ slots.push(minutesToTime(t)); }
    return slots;
  }
  function isClosedDay(dateStr){
    const d = parseIsoDate(dateStr);
    return (bookingConfig.closedWeekdays||[]).includes(d.getDay());
  }
  function getBookingsForDate(dateStr){
    return bookings.filter(b=>b.date===dateStr && b.status!=='cancelled').sort((a,b)=>timeToMinutes(a.time)-timeToMinutes(b.time));
  }
  function slotOverlapCount(dateStr, time, duration, excludeId){
    const s = timeToMinutes(time), e = s + (duration||bookingConfig.slotMinutes);
    return getBookingsForDate(dateStr).filter(b=>{
      if(excludeId && b.id===excludeId) return false;
      const bs = timeToMinutes(b.time), be = bs + (b.duration||bookingConfig.slotMinutes);
      return s < be && bs < e;
    }).length;
  }
  function isSlotAvailable(dateStr, time, duration, excludeId){
    return slotOverlapCount(dateStr, time, duration, excludeId) < bookingConfig.maxConcurrent;
  }

  // ---------- PromptPay QR payload generator (EMVCo Thai QR Payment standard) ----------
  function pp_sanitizeTarget(id){
    let target = String(id||'').replace(/[-\s]/g,'');
    if(/^0[0-9]{9}$/.test(target)){
      // เบอร์โทรศัพท์ 10 หลัก ขึ้นต้นด้วย 0 -> แปลงเป็นรหัสสากล 0066xxxxxxxxx
      target = '0066' + target.substring(1);
    }
    return target;
  }
  function pp_formatTLV(id, value){
    const size = String(value.length).padStart(2,'0');
    return `${id}${size}${value}`;
  }
  function pp_crc16(data){
    let crc = 0xFFFF;
    for(let i=0;i<data.length;i++){
      crc ^= (data.charCodeAt(i) << 8);
      for(let j=0;j<8;j++){
        if(crc & 0x8000) crc = ((crc << 1) ^ 0x1021) & 0xFFFF;
        else crc = (crc << 1) & 0xFFFF;
      }
    }
    return crc.toString(16).toUpperCase().padStart(4,'0');
  }
  function buildPromptPayPayload(rawId, amount){
    const target = pp_sanitizeTarget(rawId);
    let targetTag = '03'; // e-Wallet ID (fallback)
    if(target.length===13){
      targetTag = target.startsWith('0066') ? '01' : '02'; // 01=เบอร์โทร, 02=เลขบัตรประชาชน/เลขนิติบุคคล
    }
    const merchantInfo = pp_formatTLV('00','A000000677010111') + pp_formatTLV(targetTag, target);
    const messageType = amount ? '12' : '11';
    let payload =
      pp_formatTLV('00','01') +
      pp_formatTLV('01', messageType) +
      pp_formatTLV('29', merchantInfo) +
      pp_formatTLV('53','764'); // THB
    if(amount){
      payload += pp_formatTLV('54', Number(amount).toFixed(2));
    }
    payload += pp_formatTLV('58','TH');
    payload += '6304';
    return payload + pp_crc16(payload);
  }
  function promptPayQrImageUrl(rawId, amount, size){
    const payload = buildPromptPayPayload(rawId, amount);
    size = size || 280;
    return `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(payload)}`;
  }

  // คำนวณ streak โดยรองรับ:
  // 1) สิทธิ์ขาดได้ฟรี 2 เดือน/ปีปฏิทิน (ปรับได้ในตั้งค่า) โดยอัตโนมัติ
  // 2) เดือนที่แอดมินอนุมัติ "รักษาสิทธิ" กรณีเหตุสุดวิสัย (ไม่จำกัดจำนวน มีเหตุผลกำกับ)
  // คำนวณ "สถานะรายเดือน" แบบเดินไปข้างหน้าตั้งแต่วันสมัคร ถึงเดือนปัจจุบัน
  // กติกา:
  // 1) เดือนที่มาใช้บริการจริง หรือได้รับการรักษาสิทธิ (เหตุสุดวิสัย/สิทธิ์ขาดฟรีตามโควต้าต่อปี) = นับสะสมต่อ
  // 2) เดือนที่ "ขาดจริง" (เกินโควต้า ไม่มีสิทธิ์คุ้มครอง) = ปรับลดระดับสมาชิกลง 1 ขั้นจากระดับปัจจุบัน
  //    แต่ต่ำสุดอยู่ที่ระดับแรกเท่านั้น — ลูกค้าที่เป็นสมาชิกแล้วจะไม่หลุดจากระดับแรก
  function freeMissLimitPerYear(){
    const n = Number(visitRule && visitRule.freeMissPerYear);
    return Number.isFinite(n) && n >= 0 ? n : 2;
  }
  function computeStreakTrace(member){
    const visits = new Set(member.visits||[]);
    const graceMap = {};
    (member.graceMonths||[]).forEach(g=>{ graceMap[g.month] = g; });
    if(!member.joinDate) return { streak:0, monthStatus:{} };

    const sortedTiers = [...tiers].sort((a,b)=>a.months-b.months);
    const monthStatus = {}; // key -> {state:'visited'|'grace'|'autograce'|'missed'|'pending', reason?}
    const now = new Date();
    const curKey = ymKey(now);
    const joinD = new Date(member.joinDate);
    let cursor = new Date(joinD.getFullYear(), joinD.getMonth(), 1);

    let streak = 0;
    let autoUsedForYear = {};
    let guard = 0;
    while(guard++ < 1200){ // กันลูปไม่รู้จบ (สูงสุด 100 ปี)
      const key = ymKey(cursor);
      if(key > curKey) break;
      const yy = key.split('-')[0];

      if(key === curKey){
        // เดือนปัจจุบันยังไม่จบเดือน — ให้เวลาลูกค้ามาใช้บริการ ยังไม่นับว่าขาด
        if(visits.has(key)){ monthStatus[key] = { state:'visited' }; streak++; }
        else if(graceMap[key]){ monthStatus[key] = { state:'grace', reason:graceMap[key].reason }; streak++; }
        else { monthStatus[key] = { state:'pending' }; }
        break;
      }

      if(visits.has(key)){
        monthStatus[key] = { state:'visited' };
        streak++;
      } else if(graceMap[key]){
        monthStatus[key] = { state:'grace', reason: graceMap[key].reason };
        streak++;
      } else if((autoUsedForYear[yy]||0) < freeMissLimitPerYear()){
        autoUsedForYear[yy] = (autoUsedForYear[yy]||0) + 1;
        monthStatus[key] = { state:'autograce' };
        streak++;
      } else {
        // ขาดจริง (เกินโควต้าขาดฟรีของปีนั้น) — ปรับลดลง 1 ขั้น แต่ต่ำสุดคือระดับแรก ไม่หลุดจากการเป็นสมาชิก
        monthStatus[key] = { state:'missed' };
        const curTier = tierForStreak(streak);
        const curIdx = sortedTiers.indexOf(curTier);
        if(curIdx < 0){
          // ยังสะสมไม่ถึงระดับแรก — เริ่มนับใหม่
          streak = 0;
        } else if(curIdx === 0){
          // อยู่ระดับแรกแล้ว — คงระดับแรกไว้ ไม่ตกต่ำกว่านี้
          streak = sortedTiers[0].months;
        } else {
          streak = sortedTiers[curIdx-1].months;
        }
      }
      cursor.setMonth(cursor.getMonth()+1);
    }
    return { streak, monthStatus };
  }
  function computeStreak(member){
    return computeStreakTrace(member).streak;
  }
  const NO_TIER = { name:'ยังไม่ถึงเกณฑ์ระดับสมาชิก', months:0, discount:0, isNone:true };
  function tierForStreak(streak){
    const sorted = [...tiers].sort((a,b)=>a.months-b.months);
    if(sorted.length===0) return NO_TIER;
    if(streak < sorted[0].months) return NO_TIER;
    let current = sorted[0];
    for(const t of sorted){ if(streak >= t.months) current = t; }
    return current;
  }
  function nextTierInfo(streak){
    const sorted = [...tiers].sort((a,b)=>a.months-b.months);
    for(const t of sorted){ if(t.months > streak) return { tier:t, monthsLeft: t.months - streak }; }
    return null;
  }
  function daysLeftInMonth(){
    const now = new Date();
    const lastDay = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
    return lastDay - now.getDate();
  }
  function isAtRisk(member){
    const cur = ymKey(new Date());
    const streak = computeStreak(member);
    return !member.visits.includes(cur) && streak > 0;
  }
  function buildLineMessage(member){
    const streak = computeStreak(member);
    const tier = tierForStreak(streak);
    const days = daysLeftInMonth();
    const name = member.name ? ('คุณ'+member.name) : 'ลูกค้า NEKO';
    return `สวัสดีค่ะ${name} 🌸 NEKO Eyelash & Nail Studio ขอแจ้งเตือนว่าสิทธิพิเศษระดับ "${tier.name}" (ส่วนลด ${tier.discount}%) ของคุณจะถูกรีเซ็ตถ้ายังไม่ได้มาใช้บริการภายในเดือนนี้ค่ะ เหลืออีก ${days} วัน 💕 แวะมาให้เราดูแลกันนะคะ`;

  async function fsGet(key){
    const url = `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT_ID}/databases/(default)/documents/neko_data/${encodeURIComponent(key)}`;
    const res = await fetch(url);
    if(res.status === 404) return null;
    if(!res.ok) throw new Error('firestore get '+res.status+': '+(await res.text()).slice(0,200));
    const data = await res.json();
    return (data.fields && data.fields.value && data.fields.value.stringValue) || null;
  }
  async function fsSet(key, value){
    const url = `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT_ID}/databases/(default)/documents/neko_data/${encodeURIComponent(key)}?updateMask.fieldPaths=value`;
    const res = await fetch(url, {
      method:'PATCH',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ fields: { value: { stringValue: value } } })
    });
    if(!res.ok) throw new Error('firestore set '+res.status+': '+(await res.text()).slice(0,200));
  }
  async function storageGet(key){
    if(firebaseEnabled()){
      try{ return await fsGet(key); }
      catch(e){ console.error('storageGet failed, falling back to local:', e); storageWarning = 'เชื่อมฐานข้อมูลกลางไม่ได้ (ใช้ข้อมูลในเครื่องนี้ชั่วคราว): '+e.message; }
    }
    try{ return localStorage.getItem(key); }catch(e){ return null; }
  }
  async function storageSet(key, value){
    if(firebaseEnabled()){
      try{ await fsSet(key, value); return; }
      catch(e){ console.error('storageSet failed, falling back to local:', e); storageWarning = 'เชื่อมฐานข้อมูลกลางไม่ได้ (บันทึกไว้ในเครื่องนี้ชั่วคราว): '+e.message; }
    }
    try{ localStorage.setItem(key, value); }catch(e){}
  }

  // ---------- ยอดที่ "นับ" เป็นการมาใช้บริการ (ไม่รวมบริการที่ตั้งค่าให้ยกเว้น เช่น ถอดเล็บ/ถอดขนตา) ----------
  function computeQualifyingAmount(items){
    return items.reduce((sum,it)=>{
      const sv = services.find(s=>s.name===it.serviceName);
      const excluded = sv ? sv.excludeFromVisit===true : false;
      return excluded ? sum : sum + it.fullPrice;
    }, 0);
  }
  // ยอดสะสม (นับเฉพาะบริการที่ไม่ยกเว้น) ของสมาชิกคนนี้ในเดือนที่ระบุ รวมทุกใบเสร็จ
  function qualifyingAmountForMonth(mem, monthKey){
    return (mem.transactions||[])
      .filter(t => ymKey(new Date(t.timestamp)) === monthKey)
      .reduce((sum,t) => sum + computeQualifyingAmount(txDisplayItems(t)), 0);
  }
  // เช็คยอดสะสมทั้งเดือน ถ้าถึงเกณฑ์ให้นับเป็นเดือนที่มาใช้บริการ (ไม่ถอดสิทธิ์คืนถ้าเคยได้แล้ว)
  // กติกาขั้นต่ำ: ระดับแรก (และลูกค้าที่ยังไม่มีระดับ) ไม่มียอดขั้นต่ำ มาใช้บริการเท่าไหร่ก็นับ
  // ยอดขั้นต่ำต่อเดือนเริ่มบังคับใช้ตั้งแต่ลูกค้าอยู่ระดับที่สองขึ้นไป
  function memberNeedsMinAmount(mem){
    const sorted = [...tiers].sort((a,b)=>a.months-b.months);
    const t = tierForStreak(computeStreak(mem));
    if(t.isNone) return false;
    return sorted.indexOf(t) >= 1; // ระดับที่สองขึ้นไป (index 1+)
  }
  function recalcVisitForMonth(mem, monthKey){
    const total = qualifyingAmountForMonth(mem, monthKey);
    const needMin = memberNeedsMinAmount(mem);
    const qualified = needMin ? (total >= visitRule.minAmount) : (total > 0);
    if(qualified){
      if(!mem.visits.includes(monthKey)){ mem.visits.push(monthKey); mem.visits.sort(); }
      return { qualified:true, total, needMin };
    }
    return { qualified:false, total, needMin };
  }

  // ---------- VAT helper ----------
  // คืนค่า { preVat, vatAmount, grandTotal } จากยอดที่คำนวณส่วนลดแล้ว (finalTotal)
  function computeVat(finalTotal){
    if(!vatConfig.enabled || !vatConfig.rate){
      return { preVat: finalTotal, vatAmount: 0, grandTotal: finalTotal };
    }
    const rate = vatConfig.rate / 100;
    if(vatConfig.mode === 'exclusive'){
      const vatAmount = Math.round(finalTotal * rate);
      return { preVat: finalTotal, vatAmount, grandTotal: finalTotal + vatAmount };
    }
    // inclusive: ราคาที่คำนวณไว้รวม VAT อยู่แล้ว แยกยอดก่อน VAT ออกมาให้ดู
    const preVat = Math.round(finalTotal / (1+rate));
    const vatAmount = finalTotal - preVat;
    return { preVat, vatAmount, grandTotal: finalTotal };
  }

  // ---------- remote OTP via Google Apps Script (JSONP — avoids CORS issues with Apps Script) ----------
  function jsonpRequest(url, params, timeoutMs=12000){
    return new Promise((resolve, reject)=>{
      const cbName = 'nekoOtpCb_' + Date.now() + '_' + Math.floor(Math.random()*100000);
      const script = document.createElement('script');
      let done = false;
      function cleanup(){
        delete window[cbName];
        if(script.parentNode) script.parentNode.removeChild(script);
      }
      window[cbName] = (data)=>{
        if(done) return;
        done = true;
        cleanup();
        resolve(data);
      };
      script.onerror = ()=>{
        if(done) return;
        done = true;
        cleanup();
        reject(new Error('โหลดสคริปต์ไม่สำเร็จ — ตรวจว่า URL ถูกต้องและลงท้าย /exec'));
      };
      const qs = new URLSearchParams({ ...params, callback: cbName }).toString();
      script.src = url + (url.includes('?') ? '&' : '?') + qs;
      document.body.appendChild(script);
      setTimeout(()=>{
        if(done) return;
        done = true;
        cleanup();
        reject(new Error('หมดเวลารอการตอบกลับ (timeout)'));
      }, timeoutMs);
    });
  }
  async function callOtpApi(payload){
    return await jsonpRequest(emailConfig.url, { ...payload, secret: emailConfig.secret });
  }
  async function requestOtp(){
    otpSending = true;
    authError = '';
    render();
    if(emailConfig.url && emailConfig.secret){
      try{
        const data = await callOtpApi({ action:'send' });
        if(data.ok){
          otpMode = 'remote';
          pendingOtp = null;
          otpSending = false;
          return true;
        }
        authError = data.message || 'ส่งอีเมลไม่สำเร็จ';
        // cooldown ยังถือว่าส่งไปแล้ว ให้กรอกรหัสเดิมที่อีเมลได้
        if(data.error === 'cooldown'){ otpMode = 'remote'; otpSending = false; return true; }
      }catch(e){
        authError = 'เชื่อมต่อระบบอีเมลไม่ได้ ('+e.message+') ใช้โหมดสาธิตแทน';
      }
    }
    otpMode = 'demo';
    pendingOtp = genOtp();
    otpSending = false;
    return true;
  }
  async function verifyOtp(code){
    if(otpMode === 'remote'){
      try{
        const data = await callOtpApi({ action:'verify', code });
        return !!data.ok;
      }catch(e){ return false; }
    }
    return code === pendingOtp;
  }

  function resolveDiscountChoice(choice, mem){
    // returns { percent, label }
    if(choice === 'tier' && mem){
      const streak = computeStreak(mem);
      const tier = tierForStreak(streak);
      const label = tier.isNone ? 'ยังไม่ถึงเกณฑ์ระดับสมาชิก (ไม่มีส่วนลด)' : 'ระดับสมาชิก: '+tier.name;
      return { percent: tier.discount, label };
    }
    if(choice === 'none' || !choice){
      return { percent: 0, label: 'ไม่มีส่วนลด' };
    }
    const promo = promotions.find(p=>p.id===choice);
    if(promo) return { percent: promo.percent, label: 'โปรโมชั่น: '+promo.name };
    return { percent: 0, label: 'ไม่มีส่วนลด' };
  }

  // กันลูกไก่ให้คนอื่นใช้สิทธิ์ระดับสมาชิกซ้ำ — สิทธิ์ส่วนลดตามระดับสมาชิกใช้ได้แค่ 1 ครั้ง/บริการ/เดือน
  function serviceUsedTierDiscountThisMonth(mem, serviceName, monthKey){
    return (mem.transactions||[]).some(t=>{
      if(ymKey(new Date(t.timestamp)) !== monthKey) return false;
      if(t.discountChoice !== 'tier') return false;
      return txDisplayItems(t).some(it=>it.serviceName===serviceName && it.discountEligible!==false && it.discountAmount>0);
    });
  }

  function buildItemsFromCart(cart, percent, opts){
    opts = opts || {};
    const seenThisCart = new Set();
    return cart.map(it=>{
      const eligible = it.discountEligible !== false;
      let usedPercent = eligible ? percent : 0;
      let tierLimited = false;
      if(eligible && usedPercent>0 && opts.tierLimitMember){
        const already = seenThisCart.has(it.serviceName) || serviceUsedTierDiscountThisMonth(opts.tierLimitMember, it.serviceName, opts.monthKey);
        if(already){ usedPercent = 0; tierLimited = true; }
        else { seenThisCart.add(it.serviceName); }
      }
      const discountAmount = Math.round(it.price * usedPercent / 100);
      const finalPrice = it.price - discountAmount;
      return { serviceName: it.serviceName, fullPrice: it.price, discountEligible: eligible, discountAmount, finalPrice, tierLimited };
    });
  }

  function saveTransaction(phone){
    const mem = members[phone];
    if(!mem) return;
    if(txCart.length===0){ showToast('เพิ่มบริการอย่างน้อย 1 รายการก่อนบันทึก'); return; }
    const { percent, label } = resolveDiscountChoice(txDiscountChoice, mem);
    const tierOpts = txDiscountChoice==='tier' ? { tierLimitMember: mem, monthKey: ymKey(new Date()) } : undefined;
    const items = buildItemsFromCart(txCart, percent, tierOpts);
    const totalFull = items.reduce((s,it)=>s+it.fullPrice,0);
    const totalDiscountAmount = items.reduce((s,it)=>s+it.discountAmount,0);
    const totalFinal = items.reduce((s,it)=>s+it.finalPrice,0);
    const deposit = Math.max(0, Math.min(Number(txDeposit)||0, totalFinal));
    const amountDue = totalFinal - deposit;
    const now = new Date();
    const newTx = {
      id: 'tx_'+now.getTime()+'_'+Math.floor(Math.random()*1000),
      items,
      discountChoice: txDiscountChoice, discountLabel: label, discountPercent: percent,
      totalFull, totalDiscountAmount, totalFinal,
      deposit, amountDue,
      paymentMethod: txPaymentMethod,
      timestamp: now.toISOString()
    };
    mem.transactions.unshift(newTx);
    const key = ymKey(now);
    const { qualified, total, needMin } = recalcVisitForMonth(mem, key);
    saveMembers();
    txCart = [];
    txItemForm = freshItemForm();
    txPaymentMethod = 'cash';
    txDeposit = '';
    if(qualified){
      showToast('บันทึกรายการบริการเรียบร้อย ✓');

      showToast(`บันทึกแล้ว สะสมยอดเดือนนี้ ฿${money(total)} จาก ฿${money(visitRule.minAmount)} (อีก ฿${money(visitRule.minAmount-total)} จะนับเป็นการมาใช้บริการเดือนนี้)`);
    } else {
      showToast('บันทึกแล้ว (รายการนี้เป็นบริการที่ไม่นับยอดเข้าเกณฑ์การมาใช้บริการ)');
    }
    receiptView = { tx:newTx, custLabel: mem.name || mem.phone };
    render();
  }

  function saveGuestTransaction(){
    if(guestTxCart.length===0){ showToast('เพิ่มบริการอย่างน้อย 1 รายการก่อนบันทึก'); return; }
    const { percent, label } = resolveDiscountChoice(guestTxDiscountChoice, null);
    const items = buildItemsFromCart(guestTxCart, percent);
    const totalFull = items.reduce((s,it)=>s+it.fullPrice,0);
    const totalDiscountAmount = items.reduce((s,it)=>s+it.discountAmount,0);
    const totalFinal = items.reduce((s,it)=>s+it.finalPrice,0);
    const deposit = Math.max(0, Math.min(Number(guestTxDeposit)||0, totalFinal));
    const amountDue = totalFinal - deposit;
    const now = new Date();
    const newTx = {
      id: 'gtx_'+now.getTime()+'_'+Math.floor(Math.random()*1000),
      items,
      discountChoice: guestTxDiscountChoice, discountLabel: label, discountPercent: percent,
      totalFull, totalDiscountAmount, totalFinal,
      deposit, amountDue,
      paymentMethod: guestTxPaymentMethod,
      timestamp: now.toISOString()
    };
    guestTransactions.unshift(newTx);
    saveGuestTransactions();
    guestTxCart = [];
    guestTxItemForm = freshItemForm();
    guestTxPaymentMethod = 'cash';
    guestTxDeposit = '';
    showToast('บันทึกรายการขาย Guest เรียบร้อย ✓');
    receiptView = { tx:newTx, custLabel:'Guest' };
    render();
  }

  // ---------- backward-compatible transaction display helpers ----------
  // เผื่อรายการเก่าที่บันทึกไว้ก่อนอัปเดตฟีเจอร์หลายบริการ/รายการ
  function txDisplayItems(t){
    if(t.items) return t.items;
    return [{ serviceName: t.serviceName, fullPrice: t.fullPrice, discountEligible:true, discountAmount: t.discountAmount, finalPrice: t.finalPrice }];
  }
  function txTotals(t){
    if(t.totalFinal != null){
      const deposit = t.deposit || 0;
      const amountDue = t.amountDue != null ? t.amountDue : (t.totalFinal - deposit);
      return { totalFull: t.totalFull, totalDiscountAmount: t.totalDiscountAmount, totalFinal: t.totalFinal, discountLabel: t.discountLabel, discountPercent: t.discountPercent, deposit, amountDue };
    }
    return { totalFull: t.fullPrice, totalDiscountAmount: t.discountAmount, totalFinal: t.finalPrice, discountLabel: t.discountLabel, discountPercent: t.discountPercent, deposit: 0, amountDue: t.finalPrice };
  }

  // ---------- CSV export & dashboard stats ----------
  function csvEscape(v){
    const s = String(v==null?'':v);
    if(/[",\n]/.test(s)) return '"'+s.replace(/"/g,'""')+'"';
    return s;
  }
  function downloadCsv(filename, rows){
    const content = rows.map(r=>r.map(csvEscape).join(',')).join('\r\n');
    const blob = new Blob(['\uFEFF'+content], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 2000);
  }
  function downloadJson(filename, obj){
    const blob = new Blob([JSON.stringify(obj, null, 2)], {type:'application/json;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 2000);
  }

      rows.push([m.phone, m.name||'', m.joinDate, tier.name, tier.discount, streak, m.visits.length, (m.transactions||[]).length, totalSpent]);

    downloadCsv('neko_members_'+ymKey(new Date())+'.csv', rows);

  function allTransactionsFlat(){
    const list = [];
    Object.values(members).forEach(m=>{
      (m.transactions||[]).forEach(t=>list.push({ ...t, custType:'สมาชิก', phone:m.phone, name:m.name||'' }));

  function inRange(iso, range){
    const d = new Date(iso);
    const now = new Date();
    if(range==='today'){
      return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth() && d.getDate()===now.getDate();
    }
    if(range==='month'){
      return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth();
    }
    return true; // all
  }

  function computeDashboardStats(range){
    const txs = allTransactionsFlat().filter(t=>inRange(t.timestamp, range));
    const revenue = txs.reduce((s,t)=>s+txTotals(t).totalFinal,0);
    const totalDiscount = txs.reduce((s,t)=>s+txTotals(t).totalDiscountAmount,0);
    const guestCount = txs.filter(t=>t.custType==='Guest').length;
    const memberCount = txs.filter(t=>t.custType==='สมาชิก').length;

    const svcMap = {};
    txs.forEach(t=>{
      txDisplayItems(t).forEach(it=>{
        if(!svcMap[it.serviceName]) svcMap[it.serviceName] = { count:0, revenue:0 };
        svcMap[it.serviceName].count++;
        svcMap[it.serviceName].revenue += it.finalPrice;
      });
    });
    const topServices = Object.entries(svcMap).map(([name,v])=>({ name, ...v })).sort((a,b)=>b.revenue-a.revenue).slice(0,6);

    const promoMap = {};
    txs.forEach(t=>{
      const tot = txTotals(t);
      if(tot.discountLabel && tot.discountLabel.startsWith('โปรโมชั่น:')){
        const key = tot.discountLabel;
        if(!promoMap[key]) promoMap[key] = { count:0, discountGiven:0 };
        promoMap[key].count++;
        promoMap[key].discountGiven += tot.totalDiscountAmount;
      }
    });
    const promoUsage = Object.entries(promoMap).map(([name,v])=>({ name, ...v })).sort((a,b)=>b.count-a.count);

    const tierCounts = {};
    tiers.forEach(t=>tierCounts[t.name]=0);
    Object.values(members).forEach(m=>{
      const t = tierForStreak(computeStreak(m));
      tierCounts[t.name] = (tierCounts[t.name]||0)+1;
    });
    const tierDist = Object.entries(tierCounts).map(([name,count])=>({name,count}));

    const now = new Date();
    const newMembersThisMonth = Object.values(members).filter(m=>{
      const d = new Date(m.joinDate);
      return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth();
    }).length;

    return {
      revenue, totalDiscount, txCount: txs.length, guestCount, memberCount,
      topServices, promoUsage, tierDist, newMembersThisMonth,
      totalMembers: Object.keys(members).length
    };
  }

  // ---------- image helpers ----------
  function resizeImagePreserveAspect(file, maxDim=900, quality=0.75){
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onerror = ()=>reject(new Error('อ่านไฟล์ไม่สำเร็จ'));
      reader.onload = ()=>{
        const img = new Image();
        img.onerror = ()=>reject(new Error('เปิดรูปภาพไม่สำเร็จ'));
        img.onload = ()=>{
          // ไม่ครอบตัดรูป — ย่อขนาดลงตามสัดส่วนเดิม ถ้าด้านที่ยาวกว่ามีขนาดเกิน maxDim เท่านั้น
          const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
          const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  async function copyText(text, btn){
    try{ await navigator.clipboard.writeText(text); }
    catch(e){
      try{
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
        document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
      }catch(e2){}
    }
    if(btn){
      const original = btn.textContent;
      btn.textContent = 'คัดลอกแล้ว ✓'; btn.classList.add('copied');
      setTimeout(()=>{ btn.textContent = original; btn.classList.remove('copied'); }, 1600);
    }
    showToast('คัดลอกข้อความแจ้งเตือนแล้ว วางในแชท LINE OA ได้เลย');
  }

  function el(tag, props={}, children=[]){
    const e = document.createElement(tag);
    for(const [k,v] of Object.entries(props)){
      if(k==='class') e.className = v;
      else if(k==='html') e.innerHTML = v;
      else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
      else e.setAttribute(k, v);
    }
    (Array.isArray(children)?children:[children]).forEach(c=>{
      if(c==null) return;
      if(typeof c==='string') e.appendChild(document.createTextNode(c));
      else e.appendChild(c);
    });
    return e;
  }
  function tierColor(idx){
    const palette = ['#C79A8A','#E8709F','#B98A4E','#D9A45B','#E0C070'];
    return palette[Math.max(0, Math.min(idx, palette.length-1))];
  }

  // ---------- main render ----------
  function render(){
    app.innerHTML = '';
    if(!loaded){
      app.appendChild(el('div',{class:'empty'},'กำลังโหลดข้อมูล...'));
      return;
    }
    if(!firebaseEnabled()){
      app.appendChild(el('div',{style:'background:#FFF3D6;border:1px solid #E8C97A;color:#8A6A1F;font-size:11.5px;padding:10px 14px;border-radius:10px;margin-bottom:14px;line-height:1.6;'},
        '⚠️ ยังไม่ได้เชื่อมฐานข้อมูลกลาง (Firebase) — ตอนนี้ข้อมูลบันทึกเฉพาะเบราว์เซอร์นี้เครื่องเดียว เปิดจากเครื่องอื่นจะไม่เห็นข้อมูลเดียวกัน (ดูวิธีเชื่อมต่อได้จากคู่มือที่แนบให้)'
      ));
    } else if(storageWarning){
      app.appendChild(el('div',{style:'background:#FBE1DE;border:1px solid #E0A79E;color:#8A3A2F;font-size:11.5px;padding:10px 14px;border-radius:10px;margin-bottom:14px;line-height:1.6;'}, storageWarning));
    }
    if(view==='landing') renderLanding();
    else if(view==='customer') renderCustomerView();
    else if(view==='adminAuth') renderAdminAuth();
    else if(view==='admin') renderAdminDashboard();

    if(editingTx){ renderTxEditModal(); }
    if(monthActionTarget){ renderMonthActionModal(); }
    if(lightboxImage){ renderLightbox(); }
    if(aftercareOpen){ renderAftercareModal(); }
    if(bookingForm){ renderBookingFormModal(); }
    if(qrPaymentView){ renderQrPaymentModal(); }
    if(billSummaryView){ renderBillSummaryModal(); }
    if(receiptView){ renderReceiptModal(); }

    if(toastMsg){ app.appendChild(el('div',{class:'toast'}, toastMsg)); }
  }

  // ---------- customer side ----------
  // ---------- transaction lookup / mutation (for editing past sales) ----------
  function findTx(scope, phone, txId){
    if(scope==='member'){
      const mem = members[phone];
      if(!mem) return null;
      const t = (mem.transactions||[]).find(x=>x.id===txId);
      return t ? { t, mem } : null;
    }
    const t = guestTransactions.find(x=>x.id===txId);
    return t ? { t } : null;
  }
  function deleteTx(scope, phone, txId){
    if(scope==='member'){
      const mem = members[phone];
      if(!mem) return;
      mem.transactions = (mem.transactions||[]).filter(x=>x.id!==txId);
      saveMembers();
    } else {
      guestTransactions = guestTransactions.filter(x=>x.id!==txId);
      saveGuestTransactions();
    }
  }
  function openTxEditor(scope, phone, txId){
    const found = findTx(scope, phone, txId);
    if(!found) return;
    const items = txDisplayItems(found.t);
    editingTx = { scope, phone, txId };
    txEditCart = items.map(it=>({ serviceName: it.serviceName, price: it.fullPrice, discountEligible: it.discountEligible!==false }));
    txEditDiscountChoice = found.t.discountChoice || 'none';
    const d = new Date(found.t.timestamp);
    const pad2 = n=>String(n).padStart(2,'0');
    txEditTimestamp = `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}T${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
    render();
  }
  function closeTxEditor(){
    editingTx = null;
    render();
  }
  function saveTxEdit(){
    const found = findTx(editingTx.scope, editingTx.phone, editingTx.txId);
    if(!found) { closeTxEditor(); return; }
    if(txEditCart.length===0){ showToast('ต้องมีอย่างน้อย 1 รายการ'); return; }
    const oldMonthKey = ymKey(new Date(found.t.timestamp));
    const { percent, label } = resolveDiscountChoice(txEditDiscountChoice, found.mem);
    const items = buildItemsFromCart(txEditCart, percent);
    const totalFull = items.reduce((s,it)=>s+it.fullPrice,0);
    const totalDiscountAmount = items.reduce((s,it)=>s+it.discountAmount,0);
    const totalFinal = items.reduce((s,it)=>s+it.finalPrice,0);
    const newTimestamp = txEditTimestamp ? new Date(txEditTimestamp).toISOString() : found.t.timestamp;
    Object.assign(found.t, {
      items, discountChoice: txEditDiscountChoice, discountLabel: label, discountPercent: percent,
      totalFull, totalDiscountAmount, totalFinal, timestamp: newTimestamp
    });
    delete found.t.serviceName; delete found.t.fullPrice; delete found.t.discountAmount; delete found.t.finalPrice;
    if(editingTx.scope==='member' && found.mem){
      const newMonthKey = ymKey(new Date(newTimestamp));
      recalcVisitForMonth(found.mem, oldMonthKey);
      if(newMonthKey !== oldMonthKey) recalcVisitForMonth(found.mem, newMonthKey);
      saveMembers();
    } else {
      saveGuestTransactions();
    }
    showToast('แก้ไขรายการเรียบร้อย ✓');
    closeTxEditor();
  }

  function renderTxCard(t, editCtx){
    const tot = txTotals(t);
    const items = txDisplayItems(t);
    const itemLines = items.map(it=>{
      const parts = [it.serviceName + ' ฿' + money(it.fullPrice)];
      if(it.discountEligible===false) parts.push('(ราคาเต็ม ไม่ร่วมส่วนลด)');
      return parts.join(' ');
    });
    const children = [
      el('div',{class:'tx-main'},[
        el('div',{class:'tx-service'}, items.length>1 ? `${items[0].serviceName} +${items.length-1} รายการ` : items[0].serviceName),
        el('div',{class:'tx-time'}, formatDateTime(t.timestamp) + (editCtx && editCtx.custLabel ? ' • '+editCtx.custLabel : '')),
        items.length>1 ? el('div',{class:'tx-time', style:'margin-top:3px;'}, itemLines.join(' • ')) : null,
        el('div',{style:'margin-top:6px;display:flex;gap:12px;'},[
          el('button',{class:'link-btn', onclick:()=>{ receiptView = { tx:t, custLabel: editCtx ? editCtx.custLabel : null }; render(); }},'🧾 ใบเสร็จ'),
          (editCtx && editCtx.canEdit) ? el('button',{class:'link-btn', onclick:()=>openTxEditor(editCtx.scope, editCtx.phone, t.id)},'แก้ไข') : null,
          (editCtx && editCtx.canEdit) ? el('button',{class:'link-btn', style:'color:var(--danger);', onclick:()=>{
            if(confirm('ลบรายการขายนี้หรือไม่? การลบไม่สามารถย้อนกลับได้')){ deleteTx(editCtx.scope, editCtx.phone, t.id); render(); }
          }},'ลบ') : null,
        ]),
      ]),
      el('div',{class:'tx-price'},[
        tot.totalDiscountAmount>0 ? el('div',{class:'tx-full'}, '฿'+money(tot.totalFull)) : null,
        el('div',{class:'tx-final'}, '฿'+money(tot.totalFinal)),
        tot.totalDiscountAmount>0 ? el('div',{class:'tx-disc'}, `-฿${money(tot.totalDiscountAmount)} (${tot.discountLabel})`) : null,
      ])
    ];
    return el('div',{class:'tx-item'}, children);
  }

    const img = wrap.querySelector('img');
    function probeImage(src){
      return new Promise(resolve=>{
        const test = new Image();
        test.onload = ()=>resolve(src);
        test.onerror = ()=>resolve(null);
        test.src = src;
      });
    }

  function renderMonthCalendar(member, opts){
    opts = opts || {};
    const trace = computeStreakTrace(member);
    const track = el('div',{class:'streak-track'});
    let d = new Date();
    for(let i=11;i>=0;i--){
      const dd = new Date(d.getFullYear(), d.getMonth()-i, 1);
      const key = ymKey(dd);
      const info = trace.monthStatus[key] || { state:'missed' };
      const stateClass = info.state==='visited' ? 'filled' : (info.state==='grace' ? 'grace' : (info.state==='autograce' ? 'autograce' : (info.state==='pending' ? 'pending' : '')));
      const dotProps = { class:'streak-dot'+(stateClass?' '+stateClass:'')+(opts.editable?' editable':'') };
      if(info.state==='grace' && info.reason) dotProps.title = 'เหตุผล: '+info.reason;
      if(opts.editable){
        dotProps.onclick = ()=>opts.onMonthClick(key, info);
      }
      track.appendChild(el('div', dotProps, thaiMonth(key).split(' ')[0]));
    }
    return track;
  }

      async function doLogin(){
        authError='';
        const uname = authForm.username.trim();
        // owner?
        if(uname === adminAuth.owner.username){
          const hash = await sha256Hex(adminAuth.owner.salt+':'+authForm.password);
          if(hash !== adminAuth.owner.hash){ authError='รหัสผ่านไม่ถูกต้อง'; render(); return; }
          pendingLogin = { role:'owner', username: uname };
          authForm.otpInput = '';
          authStage = 'otp';
          await requestOtp();
          render();
          return;
        }
        // staff?
        const st = adminAuth.staff.find(s=>s.username===uname);
        if(st){
          const hash = await sha256Hex(st.salt+':'+authForm.password);
          if(hash !== st.hash){ authError='รหัสผ่านไม่ถูกต้อง'; render(); return; }
          currentRole = 'staff';
          currentUsername = st.username;
          startBookingReminderTimer();
          if(rememberDevice) saveSession('staff', st.username);
          view = 'admin';
          render();
          return;
        }
        authError='ไม่พบชื่อผู้ใช้นี้';
        render();

    }

    else if(authStage === 'reset'){
      box.appendChild(el('div',{class:'auth-title'},'กู้คืนรหัสผ่านเจ้าของร้าน'));
      box.appendChild(el('div',{class:'auth-sub'},'กรอกอีเมลของร้านที่ผูกไว้ตอนตั้งค่าครั้งแรก เพื่อตั้งรหัสผ่านใหม่'));
      const emInp = el('input',{type:'text', placeholder:'อีเมลที่ผูกไว้'}); emInp.value = authForm.resetEmail;
      const npInp = el('input',{type:'password', placeholder:'รหัสผ่านใหม่ (อย่างน้อย 6 ตัว)'}); npInp.value = authForm.newPassword;
      emInp.addEventListener('input', e=>authForm.resetEmail=e.target.value);
      npInp.addEventListener('input', e=>authForm.newPassword=e.target.value);
      box.appendChild(el('div',{class:'field-stack'},[emInp,npInp]));
      if(authError) box.appendChild(el('div',{style:'color:var(--danger);font-size:12px;margin-bottom:10px;text-align:center;'}, authError));
      box.appendChild(el('button',{class:'btn block', onclick: async ()=>{
        authError='';
        if(authForm.resetEmail.trim().toLowerCase() !== adminAuth.owner.email){ authError='อีเมลไม่ตรงกับที่ผูกไว้'; render(); return; }
        if(authForm.newPassword.length<6){ authError='รหัสผ่านใหม่ต้องมีอย่างน้อย 6 ตัวอักษร'; render(); return; }
        const salt = genSalt();
        const hash = await sha256Hex(salt+':'+authForm.newPassword);
        adminAuth.owner.salt = salt; adminAuth.owner.hash = hash;
        await saveAuth();
        authStage = 'login'; authForm.password=''; authError='';
        showToast('ตั้งรหัสผ่านใหม่เรียบร้อยแล้ว');
      }},'ตั้งรหัสผ่านใหม่'));
      box.appendChild(el('div',{class:'admin-note'},'⚠️ การกู้คืนนี้ยืนยันด้วยอีเมลที่กรอกตรงกับที่บันทึกไว้ (ยังไม่ใช่การส่งอีเมลยืนยันจริง) เพื่อความปลอดภัย ควรใช้อีเมลที่คนนอกไม่ทราบ'));
      box.appendChild(el('div',{style:'text-align:center;margin-top:14px;'},[
        el('button',{class:'link-btn', onclick:()=>{ authStage='login'; authError=''; render(); }},'← กลับไปเข้าสู่ระบบ')
      ]));
    }

    app.appendChild(box);
  }

  function maskEmail(email){
    if(!email) return '';
    const [local, domain] = email.split('@');
    if(!domain) return email;
    const shown = local.slice(0,2);
    return shown + '***@' + domain;
  }

  function renderDashboardModal(){
    const overlay = el('div',{class:'overlay', onclick:(e)=>{ if(e.target===overlay){modal=null; render();} }});
    const box = el('div',{class:'modal', style:'max-width:600px;'});
    box.appendChild(el('div',{class:'modal-head'},[
      el('div',{class:'modal-title'}, dashLabels.title),
      el('div',{style:'display:flex;gap:8px;align-items:center;'},[
        el('button',{class:'btn ghost', style:'padding:5px 10px;font-size:11px;', onclick:()=>{ modal='dashlabels'; render(); }},'✏️ แก้ข้อความ'),
        el('button',{class:'close-x', onclick:()=>{modal=null; render();}},'✕')
      ])
    ]));

    const body = el('div',{});
    function draw(){
      body.innerHTML = '';
      const stats = computeDashboardStats(dashboardRange);

      const tabs = el('div',{class:'range-tabs'},[
        el('div',{class:'range-tab'+(dashboardRange==='today'?' active':''), onclick:()=>{dashboardRange='today'; draw();}},'วันนี้'),
        el('div',{class:'range-tab'+(dashboardRange==='month'?' active':''), onclick:()=>{dashboardRange='month'; draw();}},'เดือนนี้'),
        el('div',{class:'range-tab'+(dashboardRange==='all'?' active':''), onclick:()=>{dashboardRange='all'; draw();}},'ทั้งหมด'),
      ]);
      body.appendChild(tabs);

      body.appendChild(el('div',{class:'stat-grid'},[
        el('div',{class:'stat-card'},[el('div',{class:'v'},'฿'+money(stats.revenue)), el('div',{class:'l'}, dashLabels.statRevenue)]),
        el('div',{class:'stat-card'},[el('div',{class:'v'},'฿'+money(stats.totalDiscount)), el('div',{class:'l'}, dashLabels.statDiscount)]),
        el('div',{class:'stat-card'},[el('div',{class:'v'},String(stats.txCount)), el('div',{class:'l'}, dashLabels.statTxCount)]),
        el('div',{class:'stat-card'},[el('div',{class:'v'},`${stats.memberCount}/${stats.guestCount}`), el('div',{class:'l'}, dashLabels.statMemberGuest)]),
        el('div',{class:'stat-card'},[el('div',{class:'v'},String(stats.totalMembers)), el('div',{class:'l'}, dashLabels.statTotalMembers)]),
        el('div',{class:'stat-card'},[el('div',{class:'v'},String(stats.newMembersThisMonth)), el('div',{class:'l'}, dashLabels.statNewMembers)]),
      ]));

      body.appendChild(el('div',{class:'dash-section-title'}, dashLabels.sectionTopServices));
      if(stats.topServices.length===0){
        body.appendChild(el('div',{class:'empty'},'ยังไม่มีข้อมูลในช่วงนี้'));
      } else {
        const maxRev = Math.max(...stats.topServices.map(s=>s.revenue), 1);
        const list = el('div',{class:'bar-list'});
        stats.topServices.forEach(s=>{
          list.appendChild(el('div',{class:'bar-row'},[
            el('div',{class:'bar-label'},[el('span',{}, `${s.name} (${s.count})`), el('span',{}, '฿'+money(s.revenue))]),
            el('div',{class:'bar-track'},[el('div',{class:'bar-fill', style:`width:${(s.revenue/maxRev*100).toFixed(0)}%`})])
          ]));
        });
        body.appendChild(list);
      }

      body.appendChild(el('div',{class:'dash-section-title'}, dashLabels.sectionTierDist));
      const maxTier = Math.max(...stats.tierDist.map(t=>t.count), 1);
      const tierList = el('div',{class:'bar-list'});
      stats.tierDist.forEach(t=>{
        tierList.appendChild(el('div',{class:'bar-row'},[
          el('div',{class:'bar-label'},[el('span',{}, t.name), el('span',{}, t.count+' คน')]),
          el('div',{class:'bar-track'},[el('div',{class:'bar-fill', style:`width:${(t.count/maxTier*100).toFixed(0)}%`})])
        ]));
      });
      body.appendChild(tierList);

      if(stats.promoUsage.length){
        body.appendChild(el('div',{class:'dash-section-title'}, dashLabels.sectionPromoUsage));
        const maxPromo = Math.max(...stats.promoUsage.map(p=>p.count), 1);
        const promoList = el('div',{class:'bar-list'});
        stats.promoUsage.forEach(p=>{
          promoList.appendChild(el('div',{class:'bar-row'},[
            el('div',{class:'bar-label'},[el('span',{}, `${p.name} (${p.count} ครั้ง)`), el('span',{}, '-฿'+money(p.discountGiven))]),
            el('div',{class:'bar-track'},[el('div',{class:'bar-fill', style:`width:${(p.count/maxPromo*100).toFixed(0)}%`})])
          ]));
        });
        body.appendChild(promoList);
      }

      body.appendChild(el('div',{class:'dash-section-title'}, dashLabels.sectionRecentTx));
      const recentTx = allTransactionsFlat().slice(0, 15);
      if(recentTx.length===0){
        body.appendChild(el('div',{class:'empty'},'ยังไม่มีรายการขาย'));
      } else {
        const recentList = el('div',{class:'tx-list'});
        recentTx.forEach(t=>{
          const custLabel = t.custType==='Guest' ? 'Guest' : (t.name || t.phone);
          recentList.appendChild(renderTxCard(t, { scope: t.custType==='Guest' ? 'guest' : 'member', phone: t.phone, custLabel, canEdit:true }));
        });
        body.appendChild(recentList);
      }

      body.appendChild(el('div',{class:'dash-section-title'}, dashLabels.sectionExport));
      body.appendChild(el('div',{class:'export-row'},[
        el('button',{class:'btn secondary block', onclick:exportMembersCsv},'⬇ ดาวน์โหลดข้อมูลสมาชิก (CSV)'),
        el('button',{class:'btn secondary block', onclick:exportTransactionsCsv},'⬇ ดาวน์โหลดประวัติการขายทั้งหมด (CSV)'),
        el('button',{class:'btn ghost block', onclick:exportFullBackupJson},'⬇ สำรองข้อมูลทั้งหมด (JSON)'),
      ]));
      body.appendChild(el('div',{style:'font-size:11px;color:var(--muted);margin-top:8px;line-height:1.6;'},
        'ไฟล์ CSV เปิดด้วย Excel/Google Sheets ได้ทันที เหมาะสำหรับทำรายงานหรือวิเคราะห์การตลาดต่อ'));
    }
    draw();
    box.appendChild(body);

    box.appendChild(el('div',{class:'modal-actions'},[
      el('button',{class:'btn secondary', style:'flex:1;', onclick:()=>{modal=null; render();}},'ปิด')
    ]));
    overlay.appendChild(box);
    app.appendChild(overlay);

  }

    const box = el('div',{class:'modal'});

      }},'บันทึก')
    ]));
    overlay.appendChild(box);
    app.appendChild(overlay);
  }

      el('button',{class:'btn secondary', style:'flex:1;', onclick:()=>{ billSummaryView=null; render(); }},'ปิด')

  function renderVatConfigModal(){
    const overlay = el('div',{class:'overlay', onclick:(e)=>{ if(e.target===overlay){modal=null; render();} }});
    const box = el('div',{class:'modal'});
    box.appendChild(el('div',{class:'modal-head'},[
      el('div',{class:'modal-title'},'ตั้งค่าภาษีมูลค่าเพิ่ม (VAT)'),
      el('button',{class:'close-x', onclick:()=>{modal=null; render();}},'✕')
    ]));
    box.appendChild(el('div',{style:'font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.7;'},
      'เตรียมไว้ใช้ในอนาคต — ถ้ายังไม่จด VAT ปิดไว้ได้เลย ระบบจะไม่แสดงยอด VAT ในสรุปยอด/ใบเสร็จ'));

    const local = { ...vatConfig };

    const enableRow = el('label',{style:'display:flex;align-items:center;gap:10px;font-size:13px;margin-bottom:14px;cursor:pointer;'});
    const enableChk = el('input',{type:'checkbox', style:'width:auto;'}); enableChk.checked = local.enabled;
    enableChk.addEventListener('change', e=>{ local.enabled = e.target.checked; });
    enableRow.appendChild(enableChk);
    enableRow.appendChild(document.createTextNode('เปิดใช้งานคำนวณ VAT'));
    box.appendChild(enableRow);

    const rateInp = el('input',{type:'number', min:'0', max:'100', step:'0.1'}); rateInp.value = local.rate;
    rateInp.addEventListener('input', e=>{ local.rate = Number(e.target.value)||0; });
    box.appendChild(el('div',{class:'field'},[el('label',{},'อัตรา VAT (%)'), rateInp]));

    const modeSelect = el('select',{style:'margin-top:10px;'});
    modeSelect.appendChild(el('option',{value:'inclusive'},'ราคาที่ตั้งไว้รวม VAT อยู่แล้ว (แยกยอด VAT ออกมาโชว์)'));
    modeSelect.appendChild(el('option',{value:'exclusive'},'ราคาที่ตั้งไว้ยังไม่รวม VAT (บวก VAT เพิ่มจากยอด)'));
    modeSelect.value = local.mode;
    modeSelect.addEventListener('change', e=>{ local.mode = e.target.value; });
    box.appendChild(el('div',{class:'field'},[el('label',{},'รูปแบบการคำนวณ'), modeSelect]));

    box.appendChild(el('div',{class:'modal-actions'},[
      el('button',{class:'btn secondary', style:'flex:1;', onclick:()=>{modal=null; render();}},'ยกเลิก'),
      el('button',{class:'btn', style:'flex:1;', onclick:()=>{
        vatConfig = local;
        saveVatConfig();
        modal=null; render();
        showToast('บันทึกการตั้งค่า VAT แล้ว');
      }},'บันทึก')
    ]));
    overlay.appendChild(box);
    app.appendChild(overlay);
  }

      const plainBox = el('div',{class:'modal', style:'max-width:360px;text-align:center;'});
      plainBox.appendChild(el('div',{class:'modal-head'},[
        el('div',{class:'modal-title'},'สแกนจ่ายด้วย PromptPay'),
        el('button',{class:'close-x', onclick:()=>{ qrPaymentView=null; render(); }},'✕')
      ]));
      plainBox.appendChild(el('div',{class:'empty'},'ยังไม่ได้ตั้งค่า PromptPay ของร้าน — ไปที่เมนู 💳 พร้อมเพย์ ก่อน'));
      plainBox.appendChild(el('div',{class:'modal-actions'},[

  function renderPromoImagesModal(){
    const MAX_IMAGES = 6;
    const overlay = el('div',{class:'overlay', onclick:(e)=>{ if(e.target===overlay){modal=null; render();} }});
    const box = el('div',{class:'modal'});
    box.appendChild(el('div',{class:'modal-head'},[
      el('div',{class:'modal-title'},'รูปโปรโมทหน้าลูกค้า'),
      el('button',{class:'close-x', onclick:()=>{modal=null; render();}},'✕')
    ]));
    box.appendChild(el('div',{style:'font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.7;'},
      `รูปที่เปิดใช้งานจะแสดงเต็มรูปตามที่อัปโหลด (ไม่มีการครอปตัด) ในหน้าลูกค้า เรียงตามลำดับที่เห็นด้านล่าง (กด ↑↓ เพื่อสลับลำดับได้เลย ไม่ต้องลบแล้วเพิ่มใหม่) สูงสุด ${MAX_IMAGES} รูป เพื่อไม่ให้แอปโหลดช้า`));

    const body = el('div',{});
    function draw(){
      body.innerHTML = '';
      if(promoImages.length===0){
        body.appendChild(el('div',{class:'empty'},'ยังไม่มีรูปโปรโมท'));
      }
      promoImages.forEach((p, idx)=>{
        const toggle = el('label',{class:'switch'},[
          (()=>{ const i=el('input',{type:'checkbox'}); i.checked=p.active; i.addEventListener('change', e=>{ p.active=e.target.checked; savePromoImages(); }); return i; })(),
          el('span',{class:'switch-track'})
        ]);
        const capInp = el('input',{type:'text', placeholder:'คำโปรย (ไม่บังคับ)', style:'font-size:12px;padding:6px 8px;'});
        capInp.value = p.caption || '';
        capInp.addEventListener('change', e=>{ p.caption = e.target.value; savePromoImages(); });
        const moveUpBtn = el('button',{class:'link-btn', style:'font-size:16px;line-height:1;padding:2px 6px;'+(idx===0?'opacity:.25;cursor:default;':''), onclick:()=>{
          if(idx===0) return;
          [promoImages[idx-1], promoImages[idx]] = [promoImages[idx], promoImages[idx-1]];
          savePromoImages(); draw();
        }},'↑');
        const moveDownBtn = el('button',{class:'link-btn', style:'font-size:16px;line-height:1;padding:2px 6px;'+(idx===promoImages.length-1?'opacity:.25;cursor:default;':''), onclick:()=>{
          if(idx===promoImages.length-1) return;
          [promoImages[idx+1], promoImages[idx]] = [promoImages[idx], promoImages[idx+1]];
          savePromoImages(); draw();
        }},'↓');
        body.appendChild(el('div',{class:'promo-img-row'},[
          el('div',{style:'display:flex;flex-direction:column;align-items:center;'},[moveUpBtn, moveDownBtn]),
          el('img',{class:'promo-img-thumb', src:p.dataUrl, style:'cursor:pointer;', onclick:()=>{ lightboxImage = { dataUrl:p.dataUrl, caption:p.caption }; render(); }}),
          el('div',{class:'promo-img-info'},[capInp]),
          toggle,
          el('button',{class:'close-x', onclick:()=>{
            if(!confirm('ลบรูปนี้หรือไม่?')) return;
            promoImages = promoImages.filter(x=>x.id!==p.id);
            savePromoImages(); draw();
          }},'✕')
        ]));
      });

      if(promoImages.length < MAX_IMAGES){
        const fileInp = el('input',{type:'file', accept:'image/*', style:'display:none;'});
        const dropZone = el('div',{class:'upload-drop', onclick:()=>fileInp.click()}, '📷 แตะเพื่อเลือกรูปภาพ (แสดงเต็มรูป ไม่มีการครอปตัด)');
        fileInp.addEventListener('change', async (e)=>{
          const file = e.target.files[0];
          if(!file) return;
          dropZone.textContent = 'กำลังประมวลผลรูปภาพ...';
          try{
            const dataUrl = await resizeImagePreserveAspect(file);
            promoImages.push({ id:'pi_'+Date.now(), dataUrl, caption:'', active:true, createdAt:new Date().toISOString() });
            await savePromoImages();
            showToast('เพิ่มรูปโปรโมทแล้ว');
            draw();
          }catch(err){
            showToast('อัปโหลดรูปไม่สำเร็จ: '+err.message);
            draw();
          }
        });
        body.appendChild(dropZone);
        body.appendChild(fileInp);
      } else {
        body.appendChild(el('div',{style:'font-size:11px;color:var(--muted);text-align:center;'}, `ครบ ${MAX_IMAGES} รูปแล้ว ลบรูปเก่าก่อนเพิ่มใหม่`));
      }
    }
    draw();
    box.appendChild(body);

    box.appendChild(el('div',{class:'modal-actions'},[
      el('button',{class:'btn secondary', style:'flex:1;', onclick:()=>{modal=null; render();}},'เสร็จสิ้น')
    ]));
    overlay.appendChild(box);
    app.appendChild(overlay);
  }

  function openEditBooking(b){
    const sv = services.find(s=>s.name===b.serviceName);
    bookingForm = { id:b.id, phone:b.phone||'', customerName:b.customerName||'', serviceId: sv?sv.id:'__custom__', customName: sv?'':(b.serviceName||''), date:b.date, time:b.time, duration:b.duration||bookingConfig.slotMinutes, note:b.note||'', assignedStaff: b.assignedStaff||'' };

  function closeBookingForm(){ bookingForm = null; render(); }
  function saveBookingForm(){
    if(!bookingForm.customerName.trim()){ showToast('กรอกชื่อลูกค้าก่อนบันทึก'); return; }
    let serviceName = '';
    if(bookingForm.serviceId==='__custom__') serviceName = bookingForm.customName.trim();
    else { const sv = services.find(s=>s.id===bookingForm.serviceId); serviceName = sv ? sv.name : ''; }

    const avail = isSlotAvailable(bookingForm.date, bookingForm.time, bookingForm.duration, bookingForm.id);
    if(!avail){
      if(!confirm('ช่วงเวลานี้เต็มตามจำนวนคิวที่รับพร้อมกันแล้ว ต้องการลงคิวซ้อนหรือไม่?')) return;
    }
    if(bookingForm.id){
      const b = bookings.find(x=>x.id===bookingForm.id);
      if(b){
        Object.assign(b, {
          phone: normalizePhone(bookingForm.phone), customerName: bookingForm.customerName.trim(),
          serviceName, date: bookingForm.date, time: bookingForm.time, duration: Number(bookingForm.duration)||bookingConfig.slotMinutes,
          note: bookingForm.note.trim(), assignedStaff: bookingForm.assignedStaff||''
        });
      }
    } else {
      bookings.push({
        id:'bk_'+Date.now()+'_'+Math.floor(Math.random()*1000),
        phone: normalizePhone(bookingForm.phone), customerName: bookingForm.customerName.trim(),
        serviceName, date: bookingForm.date, time: bookingForm.time, duration: Number(bookingForm.duration)||bookingConfig.slotMinutes,
        note: bookingForm.note.trim(), assignedStaff: bookingForm.assignedStaff||'', status:'confirmed', createdBy: currentUsername||'', createdAt: new Date().toISOString()
      });
    }
    saveBookings();
    showToast('บันทึกคิวเรียบร้อย ✓');
    closeBookingForm();
  }

    const isOwner = currentRole === 'owner';
    const overlay = el('div',{class:'overlay', onclick:(e)=>{ if(e.target===overlay){modal=null; render();} }});
    const box = el('div',{class:'modal', style:'max-width:680px;'});
    box.appendChild(el('div',{class:'modal-head'},[
      el('div',{class:'modal-title'},'📅 จัดการคิว'),
      el('div',{style:'display:flex;gap:8px;align-items:center;'},[
        isOwner ? el('button',{class:'btn ghost', style:'padding:5px 10px;font-size:11px;', onclick:()=>{ modal='bookingsettings'; render(); }},'⚙ ตั้งค่า') : null,
        el('button',{class:'close-x', onclick:()=>{modal=null; render();}},'✕')
      ])
    ]));

    const body = el('div',{});
    function draw(){
      body.innerHTML = '';
      body.appendChild(el('div',{class:'range-tabs', style:'flex-wrap:wrap;'},[
        el('div',{class:'range-tab'+(bookingView==='summary'?' active':''), onclick:()=>{bookingView='summary'; draw();}},'สรุปวันนี้'),
        el('div',{class:'range-tab'+(bookingView==='timetable'?' active':''), onclick:()=>{bookingView='timetable'; draw();}},'ตารางร้าน'),
        el('div',{class:'range-tab'+(bookingView==='day'?' active':''), onclick:()=>{bookingView='day'; draw();}},'วัน'),
        el('div',{class:'range-tab'+(bookingView==='week'?' active':''), onclick:()=>{bookingView='week'; draw();}},'สัปดาห์'),
        el('div',{class:'range-tab'+(bookingView==='month'?' active':''), onclick:()=>{bookingView='month'; draw();}},'เดือน'),
      ]));

      if(bookingView==='summary'){ drawDailySummary(body); return; }

      const nav = el('div',{class:'booking-nav'});
      nav.appendChild(el('div',{class:'nav-arrow', onclick:()=>{ shiftFocusDate(-1); draw(); }},'‹'));
      let title = '';
      if(bookingView==='day' || bookingView==='timetable') title = formatDateThaiFull(bookingFocusDate);
      else if(bookingView==='week'){
        const s = startOfWeek(bookingFocusDate), e = addDays(s,6);
        title = formatDateThaiShort(s)+' – '+formatDateThaiShort(e);
      } else {
        const d = parseIsoDate(bookingFocusDate);
        title = thaiMonth(ymKey(d)).replace(/^\S+\s/,'')===''?'':'';
        const monthNames=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
        title = monthNames[d.getMonth()]+' '+(d.getFullYear()+543);
      }
      nav.appendChild(el('div',{class:'nav-title'}, title));
      nav.appendChild(el('div',{class:'nav-arrow', onclick:()=>{ shiftFocusDate(1); draw(); }},'›'));
      body.appendChild(nav);
      body.appendChild(el('button',{class:'btn ghost nav-today', onclick:()=>{ bookingFocusDate = new Date().toISOString().slice(0,10); draw(); }, style:'display:block;margin:0 auto 14px;'},'วันนี้'));

      if(bookingView==='day') drawDayView(body, bookingFocusDate);
      else if(bookingView==='timetable') drawShopTimetable(body, bookingFocusDate);
      else if(bookingView==='week') drawWeekView(body);
      else drawMonthView(body);
    }
    function shiftFocusDate(dir){
      if(bookingView==='day' || bookingView==='timetable') bookingFocusDate = addDays(bookingFocusDate, dir);
      else if(bookingView==='week') bookingFocusDate = addDays(bookingFocusDate, dir*7);
      else { const d = parseIsoDate(bookingFocusDate); d.setMonth(d.getMonth()+dir); bookingFocusDate = isoDate(d); }
    }
    function drawWeekView(container){
      const s = startOfWeek(bookingFocusDate);
      const grid = el('div',{class:'week-grid'});
      const todayIso = new Date().toISOString().slice(0,10);
      for(let i=0;i<7;i++){
        const d = addDays(s,i);
        const count = bookingCountForDate(d);
        const dd = parseIsoDate(d);
        grid.appendChild(el('div',{class:'week-day-col'+(d===todayIso?' today':''), onclick:()=>{ bookingFocusDate=d; bookingView='day'; draw(); }},[
          el('div',{class:'wd-label'}, WEEKDAY_TH[dd.getDay()]),
          el('div',{class:'wd-date'}, String(dd.getDate())),
          count>0 ? el('div',{class:'wd-count'}, count+' คิว') : el('div',{class:'wd-count', style:'color:var(--muted);'}, '—'),
        ]));
      }
      container.appendChild(grid);
    }
    function drawMonthView(container){
      const d = parseIsoDate(bookingFocusDate);
      const firstOfMonth = new Date(d.getFullYear(), d.getMonth(), 1);
      const gridStart = new Date(firstOfMonth);
      gridStart.setDate(gridStart.getDate() - firstOfMonth.getDay());
      const todayIso = new Date().toISOString().slice(0,10);
      const grid = el('div',{class:'month-grid'});
      WEEKDAY_TH.forEach(w=>grid.appendChild(el('div',{class:'month-weekday-label'}, w)));
      let cursor = new Date(gridStart);
      for(let i=0;i<42;i++){
        const dIso = isoDate(cursor);
        const inMonth = cursor.getMonth()===d.getMonth();
        const count = bookingCountForDate(dIso);
        const classes = ['month-day-cell'];
        if(!inMonth) classes.push('other-month');
        if(dIso===todayIso) classes.push('today');
        if(isClosedDay(dIso)) classes.push('closed-day');
        grid.appendChild(el('div',{class:classes.join(' '), onclick:()=>{ bookingFocusDate=dIso; bookingView='day'; draw(); }},[
          el('div',{class:'md-num'}, String(cursor.getDate())),
          count>0 ? el('div',{class:'md-badge'}, String(count)) : null,
        ]));
        cursor.setDate(cursor.getDate()+1);
      }
      container.appendChild(grid);
    }
    draw();
    box.appendChild(body);
    overlay.appendChild(box);
    app.appendChild(overlay);
  }

  function bookingDateTime(b){ return new Date(b.date+'T'+b.time+':00'); }
  function isImminentBooking(b){
    if(!bookingConfig.reminderEnabled) return false;
    const diffMin = (bookingDateTime(b) - new Date()) / 60000;
    return diffMin >= 0 && diffMin <= bookingConfig.reminderMinutes;
  }
  function drawDailySummary(container){
    const isOwner = currentRole === 'owner';
    const todayIso = new Date().toISOString().slice(0,10);
    const todayBookings = getVisibleBookingsForDate(todayIso);
    container.appendChild(el('div',{style:'font-size:13px;font-weight:700;margin:14px 0 4px;color:var(--sakura-dark);'}, formatDateThaiFull(todayIso)));
    container.appendChild(el('div',{class:'stat-grid', style:'margin-bottom:16px;'},[
      el('div',{class:'stat-card'},[el('div',{class:'v'}, String(todayBookings.length)), el('div',{class:'l'},'คิววันนี้')]),
      el('div',{class:'stat-card'},[el('div',{class:'v'}, String(todayBookings.filter(isImminentBooking).length)), el('div',{class:'l'},'ใกล้ถึงคิว')]),
    ]));

    if(todayBookings.length===0){
      container.appendChild(el('div',{class:'empty'},'วันนี้ยังไม่มีคิว'));
      return;
    }

    // จัดกลุ่มตามพนักงานที่รับคิว ให้ทุกคนเห็นภาพรวมทั้งร้านในที่เดียว
    const groups = {};
    todayBookings.forEach(b=>{
      const key = b.assignedStaff || 'ไม่ระบุพนักงาน';
      if(!groups[key]) groups[key] = [];
      groups[key].push(b);
    });
    Object.keys(groups).sort().forEach(staffName=>{
      container.appendChild(el('div',{style:'font-size:12px;font-weight:700;margin:14px 0 6px;color:var(--gold);'}, `👤 ${staffName} (${groups[staffName].length} คิว)`));
      groups[staffName].sort((a,b)=>timeToMinutes(a.time)-timeToMinutes(b.time)).forEach(b=>{
        container.appendChild(renderSummaryRow(b));
      });
    });
  }
  function renderSummaryRow(b){
    const imminent = isImminentBooking(b);
    const metaParts = [b.serviceName, b.duration+' นาที'];
    if(b.createdBy) metaParts.push('✍️ ลงคิวโดย: '+b.createdBy);
    return el('div',{class:'slot-row'+(imminent?' slot-row-imminent':''), onclick:()=>openEditBooking(b), style:'cursor:pointer;'},[
      el('div',{class:'slot-time'}, b.time),
      el('div',{class:'slot-bookings'},[
        el('div',{},[
          el('div',{class:'bc-name'},[ b.customerName, imminent ? el('span',{class:'imminent-badge'},'⏰ ใกล้ถึงคิว') : null ]),
          el('div',{class:'bc-meta'}, metaParts.filter(Boolean).join(' • '))
        ])
      ])
    ]);
  }

  // ตารางเวลาสรุปคิวทั้งร้าน — แถวคือเวลา คอลัมน์คือพนักงาน
  function drawShopTimetable(container, dateStr){
    const dayBookings = getVisibleBookingsForDate(dateStr);
    if(dayBookings.length===0){
      container.appendChild(el('div',{class:'empty'},'วันนี้ยังไม่มีคิวในตารางร้าน'));
      return;
    }
    // เรียงคอลัมน์พนักงานตามลำดับในระบบก่อน แล้วต่อด้วยชื่อที่ไม่อยู่ในระบบ
    const knownStaff = getAllStaffUsernames();
    const staffSet = new Set(dayBookings.map(b=>b.assignedStaff || 'ไม่ระบุพนักงาน'));
    const staffCols = [
      ...knownStaff.filter(u=>staffSet.has(u)),
      ...[...staffSet].filter(u=>!knownStaff.includes(u)).sort()
    ];
    // แถวเวลา — ใช้เวลาที่มีคิวจริงเท่านั้น เรียงจากเช้าไปดึก
    const times = [...new Set(dayBookings.map(b=>b.time))].sort((a,b)=>timeToMinutes(a)-timeToMinutes(b));

    const wrap = el('div',{class:'shop-timetable'});
    const table = el('table',{});
    const headRow = el('tr',{});
    headRow.appendChild(el('th',{},'เวลา'));
    staffCols.forEach(u=>headRow.appendChild(el('th',{},'👤 '+u)));
    table.appendChild(headRow);

    times.forEach(t=>{
      const tr = el('tr',{});
      tr.appendChild(el('td',{class:'tt-time'}, t));
      staffCols.forEach(u=>{
        const cell = el('td',{});
        dayBookings.filter(b=>b.time===t && (b.assignedStaff || 'ไม่ระบุพนักงาน')===u).forEach(b=>{
          const imminent = isImminentBooking(b);
          cell.appendChild(el('div',{class:'tt-item'+(imminent?' imminent':''), onclick:()=>openEditBooking(b)},[
            el('div',{class:'n'}, b.customerName),
            b.serviceName ? el('div',{class:'m'}, b.serviceName) : null,
            el('div',{class:'m'}, (b.duration||0)+' นาที'+(b.createdBy?' • ✍️ '+b.createdBy:''))
          ]));
        });
        tr.appendChild(cell);
      });
      table.appendChild(tr);
    });
    wrap.appendChild(table);
    container.appendChild(wrap);
    container.appendChild(el('div',{style:'font-size:11px;color:var(--muted);margin-top:10px;'},'แตะที่คิวเพื่อแก้ไข • ✍️ = คนลงคิว'));
  }

  function drawDayView(container, dateStr){
    const dayBookings = getVisibleBookingsForDate(dateStr);
    if(isClosedDay(dateStr)){
      container.appendChild(el('div',{style:'font-size:11.5px;color:var(--gold);background:var(--surface2);padding:8px 12px;border-radius:10px;margin-bottom:10px;'},'📌 วันนี้ตั้งไว้เป็นวันปิดร้านประจำ (ยังลงคิวได้ตามปกติถ้ามีนัดพิเศษ)'));
    }
    container.appendChild(el('button',{class:'btn block', style:'margin-bottom:14px;', onclick:()=>openAddBooking(dateStr, minutesToTime(Math.round((new Date().getHours()*60+new Date().getMinutes())/15)*15))},'+ ลงคิวใหม่ (เลือกเวลาได้ทั้งวัน)'));
    if(dayBookings.length===0){
      container.appendChild(el('div',{class:'empty'},'ยังไม่มีคิวในวันนี้'));
      return;
    }
    dayBookings.forEach(b=>{
      const imminent = isImminentBooking(b);
      const row = el('div',{class:'slot-row'+(imminent?' slot-row-imminent':'')});
      row.appendChild(el('div',{class:'slot-time'}, b.time));
      const metaParts = [b.serviceName, b.phone, b.duration+' นาที'];
      if(b.assignedStaff) metaParts.push('👤 '+b.assignedStaff);
      if(b.createdBy) metaParts.push('✍️ ลงคิวโดย: '+b.createdBy);
      row.appendChild(el('div',{class:'slot-bookings'},[
        el('div',{class:'booking-chip', onclick:()=>openEditBooking(b)},[
          el('div',{},[
            el('div',{class:'bc-name'},[ b.customerName, imminent ? el('span',{class:'imminent-badge'},'⏰ ใกล้ถึงคิว') : null ]),
            el('div',{class:'bc-meta'}, metaParts.filter(Boolean).join(' • '))
          ]),
          el('span',{style:'color:var(--muted);font-size:11px;'},'แก้ไข ›')
        ])
      ]));
      container.appendChild(row);
    });
  }
